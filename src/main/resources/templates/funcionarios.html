<html xmlns:th="http://www.thymeleaf.org" >
<html>
    <head>
        <title>Funcionários</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    
    <body>
        <header>
            <nav>
                <a href="/portal">Voltar para o portal</a>
            </nav>
            <h1>Lista de funcionários na empresa:</h1>
        </header>
        <main>
            
            <table>
                <tr>
                    <th>Id</th>
                    <th>Nome</th>
                    <th>Cargo</th>
                    <th>Departamento</th>
                    <th>E-mail</th>
                    <th>Contratação</th>
                </tr>
                
                <tr th:each="f : ${lista}">
                    <td th:text="${f.id}"></td>
                    <td th:text="${f.nome}"></td>
                    <td th:text="${f.cargo}"></td>
                    <td th:text="${f.departamento}"></td>
                    <td th:text="${f.email}"></td>
                    <td th:text="${f.dataContratacao}"></td>
                </tr>
                
                <h1>Lista de funcionários por departamento:</h1>
                    
                <tr>
                    <th>Id</th>
                    <th>Nome</th>
                    <th>Departamento</th>
                </tr>
                
                <tr th:each="f : ${lista2}">
                    <td th:text="${f.id}"></td>
                    <td th:text="${f.nome}"></td>
                    <td th:text="${f.departamento}"></td>

                </tr>
                
            </table>       
        </main>
    </body>
</html>
